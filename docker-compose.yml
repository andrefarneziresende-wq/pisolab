version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pisolab-db
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: pisolab
      POSTGRES_USER: pisolab
      POSTGRES_PASSWORD: pisolab_dev_2024
    volumes:
      - pisolab_pgdata:/var/lib/postgresql/data

volumes:
  pisolab_pgdata:
